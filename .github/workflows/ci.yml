name: CI

on:
  pull_request:
  push:
    branches: [master, main]
  # Weekly run so pip-audit keeps catching new CVEs against the lockfile even
  # when nothing is pushed (scheduled runs execute on the default branch).
  schedule:
    - cron: "0 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: jobs only need to read the repo. Anything that would write
# (push, comment, release) must opt in explicitly at the job level.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Keep in sync with the Dockerfile base image — CI must test the
          # interpreter the bot ships on.
          python-version: "3.14"
          cache: pip

      - name: Install locked runtime deps + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Keep in sync with the Dockerfile base image — CI must test the
          # interpreter the bot ships on.
          python-version: "3.14"
          cache: pip

      - name: Install locked runtime deps + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e ".[dev]"

      - name: Mypy (src/core strict; rest lenient)
        run: mypy src

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Keep in sync with the Dockerfile base image — CI must test the
          # interpreter the bot ships on.
          python-version: "3.14"
          cache: pip

      - name: Install locked runtime deps + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e ".[dev]"

      - name: Pytest with coverage
        run: pytest --cov=src --cov=features --cov-report=term --cov-report=xml

      - name: Coverage summary
        # Render the per-file table into the run's summary page so coverage is
        # visible per run without downloading the artifact or a third-party
        # uploader (skip_covered in pyproject.toml keeps the table short).
        if: always()
        run: |
          {
            echo "## Coverage"
            echo ""
            coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Keep in sync with the Dockerfile base image — CI must test the
          # interpreter the bot ships on.
          python-version: "3.14"

      - name: Check requirements.txt is in sync with pyproject.toml
        # Recompile on top of a copy of the committed lock — uv keeps pins
        # that still satisfy pyproject.toml, so new upstream releases don't
        # fail the check; only actual drift (dep added/removed/re-ranged
        # without regenerating the lock) does. Comments are stripped from the
        # diff so header/annotation cosmetics across uv versions don't count.
        run: |
          pip install uv
          cp requirements.txt /tmp/requirements.txt
          uv pip compile pyproject.toml -o /tmp/requirements.txt --universal --quiet
          if ! diff <(grep -v '^ *#' requirements.txt) <(grep -v '^ *#' /tmp/requirements.txt); then
            echo "::error::requirements.txt is out of sync with pyproject.toml — regenerate with: uv pip compile pyproject.toml -o requirements.txt --universal"
            exit 1
          fi

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Keep in sync with the Dockerfile base image — CI must test the
          # interpreter the bot ships on.
          python-version: "3.14"

      - name: Audit locked dependencies for known CVEs
        # --no-deps audits exactly the pins in the lockfile without resolving;
        # the lock is fully pinned so nothing is missed.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --no-deps

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          # Keep in sync with the Dockerfile base image — CI must test the
          # interpreter the bot ships on.
          python-version: "3.14"

      - name: Install detect-secrets
        run: pip install "detect-secrets>=1.5"

      - name: Scan tracked files against baseline
        # `detect-secrets-hook` is the CI-friendly entry point: it compares
        # findings against the baseline and exits non-zero on new secrets.
        # `scan --baseline` only rewrites the baseline and cannot fail a build.
        # Exclusions mirror .pre-commit-config.yaml (grafana dashboards, data
        # dumps and logs contain non-secret UUIDs that trigger false positives).
        run: |
          git ls-files -z ':!grafana/**' ':!data/**' ':!logs/**' ':!.secrets.baseline' \
            | xargs -0 detect-secrets-hook --baseline .secrets.baseline
