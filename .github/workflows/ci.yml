name: CI

on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    # Soft-fail until the bulk of src/ is typed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy (src/core strict; rest lenient)
        run: mypy src

  test:
    runs-on: ubuntu-latest
    # Soft-fail until the first real tests land.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest with coverage
        run: pytest --cov=src --cov-report=term --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install "detect-secrets>=1.5"

      - name: Scan tracked files against baseline
        # `detect-secrets-hook` is the CI-friendly entry point: it compares
        # findings against the baseline and exits non-zero on new secrets.
        # `scan --baseline` only rewrites the baseline and cannot fail a build.
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
