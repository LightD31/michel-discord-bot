<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michel Bot — Dashboard</title>
    <style>
        :root {
            --bg-primary: #1a1b1e;
            --bg-secondary: #2b2d31;
            --bg-tertiary: #313338;
            --bg-card: #2b2d31;
            --text-primary: #f2f3f5;
            --text-secondary: #b5bac1;
            --text-muted: #949ba4;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --success: #23a55a;
            --danger: #f23f43;
            --warning: #f0b232;
            --border: #3f4147;
            --shadow: rgba(0,0,0,0.3);
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Layout ────────────────────────────────── */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* ── Mobile Header ─────────────────────────── */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius);
            line-height: 1;
        }

        .hamburger:hover { background: var(--bg-tertiary); }

        .mobile-header h1 {
            font-size: 16px;
            font-weight: 700;
        }

        .mobile-header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        /* ── Sidebar Overlay (mobile) ──────────────── */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 150;
        }

        .sidebar-overlay.active { display: block; }

        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 200;
            transition: transform 0.25s ease;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .sidebar-header .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 8px 12px 4px;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .nav-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: var(--radius);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .logout-btn:hover { color: var(--danger); }

        /* ── Main Content ──────────────────────────── */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 24px 32px;
            max-width: 1100px;
            width: 100%;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ── Cards ─────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ── Stats Grid ────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-value.online { color: var(--success); }
        .stat-value.error { color: var(--danger); }

        /* ── Module List ───────────────────────────── */
        .module-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .module-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.15s;
            gap: 12px;
        }

        .module-item:hover {
            background: #383a40;
        }

        .module-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .module-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .module-status {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .module-category-header {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 8px 4px 4px;
            margin-top: 4px;
        }
        .module-category-header:first-child {
            margin-top: 0;
        }

        /* ── Toggle Switch ─────────────────────────── */
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border);
            border-radius: 12px;
            transition: 0.2s;
        }

        .toggle-slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle input:checked + .toggle-slider {
            background: var(--success);
        }

        .toggle input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        /* ── Config Editor ─────────────────────────── */
        .config-editor {
            margin-top: 16px;
        }

        .config-field {
            margin-bottom: 16px;
        }

        .config-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .config-field input[type="text"],
        .config-field input[type="number"],
        .config-field textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Consolas', 'Monaco', monospace;
            outline: none;
            transition: border-color 0.15s;
        }

        .config-field input:focus,
        .config-field textarea:focus {
            border-color: var(--accent);
        }

        .config-field textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* ── Buttons ───────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover { opacity: 0.9; }

        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover { opacity: 0.9; }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* ── Toast Notifications ───────────────────── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: calc(100vw - 48px);
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 12px var(--shadow);
            animation: toast-in 0.3s ease;
            max-width: 350px;
            word-break: break-word;
        }

        .toast.success { background: var(--success); color: white; }
        .toast.error { background: var(--danger); color: white; }
        .toast.info { background: var(--accent); color: white; }

        @keyframes toast-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Login Page ────────────────────────────── */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 16px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }

        .login-btn:hover { background: var(--accent-hover); }

        .login-btn svg { width: 24px; height: 24px; }

        /* ── JSON Editor Modal ─────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .json-editor {
            width: 100%;
            min-height: 300px;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            tab-size: 4;
        }

        .json-editor:focus { border-color: var(--accent); }

        .json-error {
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
        }

        /* ── Server icon ───────────────────────────── */
        .server-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .server-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── Breadcrumb ────────────────────────────── */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb a:hover { text-decoration: underline; }

        /* ── Loading ───────────────────────────────── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Config Key-Value pairs ────────────────── */
        .kv-grid {
            display: grid;
            grid-template-columns: minmax(120px, 200px) 1fr;
            gap: 8px 16px;
            align-items: start;
        }

        .kv-key {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            padding-top: 10px;
            word-break: break-all;
        }

        .kv-value input {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Consolas', monospace;
            outline: none;
        }

        .kv-value input:focus { border-color: var(--accent); }

        /* ── Empty states ──────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { margin-bottom: 8px; color: var(--text-secondary); }

        /* ── Schema form ───────────────────────────── */
        .schema-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 4px 0;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-field-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .required-badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--danger);
            color: #fff;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .form-description {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--accent);
        }

        .form-textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-textarea.json-field {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
        }

        .btn-reveal {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.6;
            padding: 4px;
        }
        .btn-reveal:hover { opacity: 1; }

        .schema-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-weight: 500;
        }
        .schema-badge.no-schema {
            background: var(--bg-tertiary);
            color: var(--text-muted);
        }

        .schema-preview {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }
        .preview-row:last-child { border-bottom: none; }

        .preview-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .preview-value {
            font-size: 13px;
            color: var(--text-primary);
            text-align: right;
            word-break: break-all;
            min-width: 0;
        }
        .preview-value.empty {
            color: var(--text-muted);
            font-style: italic;
        }

        /* ── Log Viewer ────────────────────────────── */
        .log-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .log-toolbar select,
        .log-toolbar input[type="text"] {
            padding: 6px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }

        .log-toolbar select:focus,
        .log-toolbar input:focus {
            border-color: var(--accent);
        }

        .log-toolbar input[type="text"] {
            flex: 1;
            min-width: 150px;
        }

        .log-container {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow: auto;
            max-height: calc(100vh - 280px);
            min-height: 300px;
            position: relative;
        }

        .log-lines {
            padding: 12px;
        }

        .log-line {
            display: flex;
            gap: 8px;
            padding: 1px 4px;
            border-radius: 2px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line:hover {
            background: rgba(255,255,255,0.04);
        }

        .log-time {
            color: var(--text-muted);
            flex-shrink: 0;
            font-size: 11px;
        }

        .log-level {
            font-weight: 700;
            flex-shrink: 0;
            width: 60px;
            text-align: center;
            border-radius: 3px;
            padding: 0 4px;
            font-size: 11px;
        }

        .log-level.DEBUG { color: #8b949e; }
        .log-level.INFO { color: #58a6ff; }
        .log-level.WARNING { color: #d29922; background: rgba(210,153,34,0.1); }
        .log-level.ERROR { color: #f85149; background: rgba(248,81,73,0.1); }
        .log-level.CRITICAL { color: #ff7b72; background: rgba(255,123,114,0.15); font-weight: 900; }

        .log-logger {

<body>
    <div id="app"></div>
    <div class="toast-container" id="toasts"></div>

    <!-- Editor Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Éditer la configuration</h3>
                <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <textarea class="json-editor" id="json-editor" spellcheck="false"></textarea>
                <div class="json-error" id="json-error"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
                <button class="btn btn-success" id="modal-save-btn" onclick="saveModal()">💾 Sauvegarder</button>
            </div>
        </div>
    </div>

    <script>
    // ── State ─────────────────────────────────────────
    const state = {
        user: null,
        currentPage: 'home',
        currentServerId: null,
        currentModule: null,
        config: null,
        servers: null,
        botInfo: null,
        modules: {},
        moduleSchemas: {},
        globalSchemas: {},
        sidebarOpen: false,
        // Log viewer state
        logs: [],
        logLevel: '',
        logSearch: '',
        logAutoScroll: true,
        logStreaming: false,
    };

    let modalSaveCallback = null;
    let logEventSource = null;

    // ── API helpers ───────────────────────────────────
    async function api(url, options = {}) {
        try {
            const resp = await fetch(url, {
                headers: { 'Content-Type': 'application/json', ...options.headers },
                ...options,
            });
            if (resp.status === 401) {
                state.user = null;
                render();
                return null;
            }
            if (resp.status === 403) {
                // Silently return null for admin-only endpoints when user is not admin
                return null;
            }
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({ detail: 'Erreur inconnue' }));
                throw new Error(err.detail || `HTTP ${resp.status}`);
            }
            return await resp.json();
        } catch (e) {
            toast(e.message, 'error');
            throw e;
        }
    }

    // ── Toast system ──────────────────────────────────
    function toast(message, type = 'info') {
        const container = document.getElementById('toasts');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = message;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }

    // ── Modal ─────────────────────────────────────────
    function openModal(title, json, onSave) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('json-editor').value = JSON.stringify(json, null, 4);
        document.getElementById('json-error').textContent = '';
        modalSaveCallback = onSave;
        document.getElementById('modal-overlay').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('active');
        modalSaveCallback = null;
        const body = document.getElementById('modal-overlay').querySelector('.modal-body');
        body.innerHTML = `
            <textarea class="json-editor" id="json-editor" spellcheck="false"></textarea>
            <div class="json-error" id="json-error"></div>
        `;
    }

    async function saveModal() {
        const editor = document.getElementById('json-editor');
        const errorEl = document.getElementById('json-error');

        if (!editor) {
            try {
                if (modalSaveCallback) {
                    await modalSaveCallback();
                }
                closeModal();
                toast('Configuration sauvegardée !', 'success');
            } catch (e) {
                if (errorEl) errorEl.textContent = e.message;
                toast('Erreur lors de la sauvegarde', 'error');
            }
            return;
        }

        try {
            const parsed = JSON.parse(editor.value);
            if (errorEl) errorEl.textContent = '';
            if (modalSaveCallback) {
                await modalSaveCallback(parsed);
            }
            closeModal();
            toast('Configuration sauvegardée !', 'success');
        } catch (e) {
            if (e instanceof SyntaxError) {
                if (errorEl) errorEl.textContent = `JSON invalide : ${e.message}`;
            } else {
                if (errorEl) errorEl.textContent = e.message;
                toast('Erreur lors de la sauvegarde', 'error');
            }
        }
    }

        if (sidebar) sidebar.classList.toggle('open', state.sidebarOpen);

    // ── Navigation ────────────────────────────────────
    function navigate(page, serverId = null, moduleName = null) {
        // Restrict admin-only pages for non-admin users
        const adminPages = ['global', 'server', 'module', 'logs'];
        if (adminPages.includes(page) && !isAdmin()) {
            page = 'home';
            serverId = null;
            moduleName = null;
        }
        state.currentPage = page;
        state.currentServerId = serverId;
        state.currentModule = moduleName;
        closeSidebar();

        if (page === 'logs') {
            startLogStream();
        } else {
            stopLogStream();
        }

        render();
    }

    // ── Log Streaming ─────────────────────────────────
    async function loadLogs() {
        try {
            const params = new URLSearchParams();
            params.set('count', '500');
            if (state.logLevel) params.set('level', state.logLevel);
            if (state.logSearch) params.set('search', state.logSearch);
            const data = await api(`/api/logs?${params}`);
            state.logs = data?.logs || [];
        } catch (e) {
            state.logs = [];
        }
    }

    function startLogStream() {
        if (logEventSource) return;
        state.logStreaming = true;

        logEventSource = new EventSource('/api/logs/stream');

        logEventSource.addEventListener('log', (event) => {
            try {
                const entry = JSON.parse(event.data);
                state.logs.push(entry);
                if (state.logs.length > 2000) {
                    state.logs = state.logs.slice(-1500);
                }
                appendLogLine(entry);
            } catch (e) { /* ignore */ }
        });

        logEventSource.addEventListener('ping', () => { /* keepalive */ });

        logEventSource.onerror = () => {
            state.logStreaming = false;
            logEventSource?.close();
            logEventSource = null;
            setTimeout(() => {
                if (state.currentPage === 'logs') {
                    startLogStream();
                }
            }, 5000);
        };
    }

    function stopLogStream() {
        if (logEventSource) {
            logEventSource.close();
            logEventSource = null;
        }
        state.logStreaming = false;
    }

    function appendLogLine(entry) {
        const container = document.getElementById('log-lines');
        if (!container) return;

        if (state.logLevel) {
            const levels = { 'DEBUG': 10, 'INFO': 20, 'WARNING': 30, 'ERROR': 40, 'CRITICAL': 50 };
            if ((levels[entry.level] || 0) < (levels[state.logLevel] || 0)) return;
        }
        if (state.logSearch) {
            const s = state.logSearch.toLowerCase();
            if (!entry.message.toLowerCase().includes(s) && !entry.logger.toLowerCase().includes(s)) return;
        }

        const line = document.createElement('div');
        line.className = 'log-line';
        line.innerHTML = formatLogLine(entry);
        container.appendChild(line);

        const countEl = document.getElementById('log-count');
        if (countEl) countEl.textContent = container.children.length;

        if (state.logAutoScroll) {
            const logContainer = document.getElementById('log-container');
            if (logContainer) {
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }
    }

    function formatLogLine(entry) {
        const time = new Date(entry.timestamp * 1000).toLocaleTimeString('fr-FR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        let msg = escapeHtml(entry.message);
        if (state.logSearch) {
            const regex = new RegExp(`(${escapeRegExp(state.logSearch)})`, 'gi');
            msg = msg.replace(regex, '<span class="log-search-highlight">$1</span>');
        }
        return `<span class="log-time">${time}</span><span class="log-level ${entry.level}">${entry.level.padEnd(8)}</span><span class="log-logger" title="${escapeHtml(entry.logger)}">${escapeHtml(entry.logger)}</span><span class="log-msg">${msg}</span>`;
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function handleLogScroll() {
        const el = document.getElementById('log-container');
        if (!el) return;
        const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
        state.logAutoScroll = atBottom;
        const btn = document.getElementById('autoscroll-btn');
        if (btn) btn.classList.toggle('visible', !atBottom);
    }

    function scrollToBottom() {
        const el = document.getElementById('log-container');
        if (el) {
            el.scrollTop = el.scrollHeight;
            state.logAutoScroll = true;
        }
        const btn = document.getElementById('autoscroll-btn');
        if (btn) btn.classList.remove('visible');
    }

    function refreshLogs() {
        loadLogs().then(() => renderLogLines());
    }

    function renderLogLines() {
        const container = document.getElementById('log-lines');
        if (!container) return;

        let filtered = state.logs;
        if (state.logLevel) {
            const levels = { 'DEBUG': 10, 'INFO': 20, 'WARNING': 30, 'ERROR': 40, 'CRITICAL': 50 };
            const minLevel = levels[state.logLevel] || 0;
            filtered = filtered.filter(e => (levels[e.level] || 0) >= minLevel);
        }
        if (state.logSearch) {
            const s = state.logSearch.toLowerCase();
            filtered = filtered.filter(e =>
                e.message.toLowerCase().includes(s) || e.logger.toLowerCase().includes(s)
            );
        }

        container.innerHTML = filtered.map(e =>
            `<div class="log-line">${formatLogLine(e)}</div>`
        ).join('');

        const countEl = document.getElementById('log-count');
        if (countEl) countEl.textContent = filtered.length;

        if (state.logAutoScroll) {
            const logC = document.getElementById('log-container');
            if (logC) logC.scrollTop = logC.scrollHeight;
        }
    }

    function onLogLevelChange(val) {
        state.logLevel = val;
        renderLogLines();
    }

    let logSearchTimeout = null;
    function onLogSearchInput(val) {
        clearTimeout(logSearchTimeout);
        logSearchTimeout = setTimeout(() => {
            state.logSearch = val;
            renderLogLines();
        }, 250);
    }

    function clearLogs() {
        state.logs = [];
        renderLogLines();
    }

    // ── Schema-based form rendering ───────────────────

    function renderSchemaForm(formId, schema, values, options = {}) {
        const fields = schema.fields || {};
        const entries = Object.entries(fields);
        if (entries.length === 0) return '<p style="color:var(--text-muted)">Aucun champ défini.</p>';

        // Collect weight fields linked from messagelist fields so we can skip them
        const linkedWeightFields = new Set();
        for (const [, f] of entries) {
            if (f.type === 'messagelist' && f.weightField) {
                linkedWeightFields.add(f.weightField);
            }
        }

        let html = `<div class="schema-form" data-form-id="${formId}">`;
        for (const [key, field] of entries) {
            if (options.excludeEnabled && key === 'enabled') continue;
            if (linkedWeightFields.has(key)) continue;

            const value = values[key];
            const hasValue = value !== undefined && value !== null;
            const fieldType = field.type || 'string';
            const isSecret = field.secret || false;
            const isRequired = field.required || false;

            html += `<div class="form-field" data-key="${key}">`;
            html += `<div class="form-field-header">`;
            html += `<label class="form-label">${field.label || key}`;
            if (isRequired) html += ' <span class="required-badge">requis</span>';
            html += `</label>`;
            html += `</div>`;
            if (field.description) {
                html += `<div class="form-description">${field.description}</div>`;
            }

            switch (fieldType) {
                case 'boolean':
                    html += `
                        <label class="toggle" style="margin-top:4px;">
                            <input type="checkbox" data-field="${key}" data-type="boolean"
                                ${value === true ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>`;
                    break;

                case 'number':
                    html += `<input type="number" class="form-input" data-field="${key}" data-type="number"
                        value="${hasValue ? value : (field.default ?? '')}"
                        placeholder="${field.default != null ? 'Défaut: ' + field.default : ''}">`;
                    break;

                case 'secret':
                    html += `<div style="position:relative;">
                        <input type="password" class="form-input" data-field="${key}" data-type="secret"
                            value="${hasValue ? value : ''}"
                            placeholder="${hasValue ? '••••••••' : 'Non défini'}">
                        <button class="btn-reveal" onclick="togglePasswordVisibility(this)" type="button" title="Afficher/masquer">👁</button>
                    </div>`;
                    break;

                case 'channel':
                case 'role':
                case 'message':
                case 'url':
                    const typeHint = {channel: 'ID du salon', role: 'ID du rôle', message: 'ID du message', url: 'URL'}[fieldType];
                    html += `<input type="text" class="form-input" data-field="${key}" data-type="${fieldType}"
                        value="${hasValue ? escapeHtml(String(value)) : ''}"
                        placeholder="${typeHint}">`;
                    break;

                case 'list':
                    const listVal = Array.isArray(value) ? value.join('\n') : (hasValue ? String(value) : '');

                    html += `<textarea class="form-textarea" data-field="${key}" data-type="list"

                    break;

                case 'list:number':
                    const numListVal = Array.isArray(value) ? value.join(', ') : (hasValue ? String(value) : '');
                    html += `<input type="text" class="form-input" data-field="${key}" data-type="list:number"
                        value="${escapeHtml(numListVal)}"
                        placeholder="Nombres séparés par des virgules (ex: 1, 2, 3)">`;
                    break;

                case 'dict':
                    const jsonStr = hasValue ? JSON.stringify(value, null, 2) : '{}';
                    html += `<textarea class="form-textarea json-field" data-field="${key}" data-type="dict"
                        rows="5" spellcheck="false">${escapeHtml(jsonStr)}</textarea>`;

                case 'keyvaluemap':

                    html += `<button type="button" class="btn-add-entry" onclick="addSpotifyUserEntry(this)">+ Ajouter un utilisateur</button>`;

                        html += `<div class="embedlist-links-label">Liens</div>`;
                        embedLinks.forEach((link, linkIdx) => {
                            const linkTitle = link.title || '';

                            html += `

                    html += `<button type="button" class="btn-add-embed" onclick="addEmbedEntry(this, '${key}')">+ Ajouter un embed</button>`;
                    break;

                default: // string
                    html += `<input type="text" class="form-input" data-field="${key}" data-type="string"
                        value="${hasValue ? escapeHtml(String(value)) : ''}"
                        placeholder="${field.default != null ? 'Défaut: ' + field.default : ''}">`;
            }

            html += `</div>`;
        }
        html += `</div>`;
        return html;
    }

    function collectFormValues(formId) {
        const form = document.querySelector(`[data-form-id="${formId}"]`);
        if (!form) return {};
        const result = {};
        const inputs = form.querySelectorAll('[data-field]');
        for (const input of inputs) {
            const key = input.dataset.field;
            const type = input.dataset.type;
            let val;
            switch (type) {
                case 'boolean':
                    val = input.checked;
                    break;
                case 'number':
                    val = input.value === '' ? undefined : Number(input.value);
                    break;
                case 'list':
                    val = input.value.trim() ? input.value.trim().split('\n').map(s => s.trim()).filter(Boolean) : undefined;
                    break;
                case 'list:number':
                    val = input.value.trim()
                        ? input.value.split(',').map(s => Number(s.trim())).filter(n => !isNaN(n))
                        : undefined;
                    break;
                case 'dict':
                    try { val = JSON.parse(input.value); } catch { val = undefined; }
                    break;
                case 'models':
                    // Handled separately below
                    continue;
                case 'teams':
                    // Handled separately below
                    continue;
                case 'discord2name':
                    // Handled separately below
                    continue;
                case 'keyvaluemap':
                    // Handled separately below
                    continue;
                case 'spotifymap':
                    // Handled separately below
                    continue;
                case 'messagelist':
                    // Handled separately below
                    continue;
                case 'embedlist':
                    // Handled separately below
                    continue;
                case 'secret':
                    val = input.value || undefined;
                    break;
                default:
                    val = input.value || undefined;
            }
            if (val !== undefined) {
                result[key] = val;
            }
        }
        // Collect models lists
        const modelsLists = form.querySelectorAll('[data-type="models"]');
        for (const list of modelsLists) {
            const key = list.dataset.field;
            const entries = list.querySelectorAll('.model-entry');
            const models = [];
            for (const entry of entries) {
                const provider = entry.querySelector('[data-model-field="provider"]')?.value?.trim();
                const model_id = entry.querySelector('[data-model-field="model_id"]')?.value?.trim();
                const display_name = entry.querySelector('[data-model-field="display_name"]')?.value?.trim();
                if (provider && model_id) {
                    models.push({ provider, model_id, display_name: display_name || provider });
                }
            }
            if (models.length > 0) {
                result[key] = models;
            }
        }

        // Collect teams lists
        const teamsLists = form.querySelectorAll('[data-type="teams"]');
        for (const list of teamsLists) {
            const key = list.dataset.field;
            const entries = list.querySelectorAll('.team-entry');
            const teams = [];
            for (const entry of entries) {
                const name = entry.querySelector('[data-team-field="name"]')?.value?.trim();
                const vlrTeamId = entry.querySelector('[data-team-field="vlrTeamId"]')?.value?.trim();
                const channelMessageId = entry.querySelector('[data-team-field="channelMessageId"]')?.value?.trim();
                if (name) {
                    const team = { name };
                    if (vlrTeamId) team.vlrTeamId = vlrTeamId;
                    if (channelMessageId) team.channelMessageId = channelMessageId;
                    teams.push(team);
                }
            }
            result[key] = teams;
        }

        // Collect discord2name lists
        const namemapLists = form.querySelectorAll('[data-type="discord2name"]');
        for (const list of namemapLists) {
            const key = list.dataset.field;
            const entries = list.querySelectorAll('.namemap-entry');
            const nameMap = {};
            for (const entry of entries) {
                const discordId = entry.querySelector('[data-namemap-field="discord_id"]')?.value?.trim();
                const name = entry.querySelector('[data-namemap-field="name"]')?.value?.trim();
                if (discordId && name) {
                    nameMap[discordId] = name;
                }
            }
            result[key] = nameMap;
        }

        // Collect keyvaluemap lists
        const kvmapLists = form.querySelectorAll('[data-type="keyvaluemap"]');
        for (const list of kvmapLists) {
            const key = list.dataset.field;
            const entries = list.querySelectorAll('.keyvaluemap-entry');
            const kvMap = {};
            for (const entry of entries) {
                const mapKey = entry.querySelector('[data-kvmap-field="key"]')?.value?.trim();
                const mapValue = entry.querySelector('[data-kvmap-field="value"]')?.value?.trim();
                if (mapKey && mapValue) {
                    kvMap[mapKey] = mapValue;
                }
            }
            result[key] = kvMap;
        }

        // Collect spotifymap lists
        const spotifymapLists = form.querySelectorAll('[data-type="spotifymap"]');
        for (const list of spotifymapLists) {
            const key = list.dataset.field;
            const entries = list.querySelectorAll('.spotifymap-entry');
            const spotifyUsers = [];
            for (const entry of entries) {
                const spotifyId = entry.querySelector('[data-spotifymap-field="spotifyId"]')?.value?.trim();
                const name = entry.querySelector('[data-spotifymap-field="name"]')?.value?.trim();
                const discordId = entry.querySelector('[data-spotifymap-field="discordId"]')?.value?.trim();
                if (spotifyId && name && discordId) {
                    spotifyUsers.push({ spotifyId, name, discordId });
                }
            }
            if (spotifyUsers.length > 0) {
                result[key] = spotifyUsers;
            }
        }

        // Collect messagelist fields
        const msgLists = form.querySelectorAll('[data-type="messagelist"]');
        for (const list of msgLists) {
            const key = list.dataset.field;
            const weightFieldKey = list.dataset.weightField;
            const entries = list.querySelectorAll('.messagelist-entry');
            const messages = [];
            const weights = [];
            for (const entry of entries) {
                const msg = entry.querySelector('[data-msg-field="message"]')?.value?.trim();
                const w = entry.querySelector('[data-msg-field="weight"]')?.value?.trim();
                if (msg) {
                    messages.push(msg);
                    weights.push(w ? Number(w) : 1);
                }
            }
            if (messages.length > 0) {
                result[key] = messages;
                if (weightFieldKey) {
                    result[weightFieldKey] = weights;
                }
            }
        }

        // Collect embedlist fields
        const embedLists = form.querySelectorAll('[data-type="embedlist"]');
        for (const list of embedLists) {
            const key = list.dataset.field;
            const entries = list.querySelectorAll('.embedlist-entry');
            const embeds = [];
            for (const entry of entries) {
                const title = entry.querySelector('[data-embed-field="title"]')?.value?.trim();
                const colorInput = entry.querySelector('[data-embed-field="color"]');
                let color = colorInput?.value || '#3498db';
                if (color.startsWith('#')) {
                    color = color.substring(1);
                }
                const linkEntries = entry.querySelectorAll('.embedlist-link-entry');
                const links = [];
                for (const linkEntry of linkEntries) {
                    const linkTitle = linkEntry.querySelector('[data-link-field="title"]')?.value?.trim();
                    const linkUrl = linkEntry.querySelector('[data-link-field="url"]')?.value?.trim();
                    if (linkTitle && linkUrl) {
                        links.push({ title: linkTitle, url: linkUrl });
                    }
                }
                const embed = {
                    title: title || 'Embed',
                    color: color,
                };
                if (links.length > 0) {
                    embed.links = links;
                }
                embeds.push(embed);
            }
            if (embeds.length > 0) {
                result[key] = embeds;
            }
        }

        return result;
    }

    // ── Global Config Page ────────────────────────────
    function renderGlobalConfig() {
        const globalConfig = state.config?.config || {};
        const allSections = new Set([
            ...Object.keys(globalConfig),
            ...Object.keys(state.globalSchemas),
        ]);
        const sections = [...allSections].sort();

        return `
            <div class="page-header">
                <h2>Configuration globale</h2>
                <p>Paramètres partagés entre tous les serveurs</p>
            </div>

            <div class="card" style="margin-bottom:16px; border: 1px solid var(--border);">
                <div class="card-header">
                    <div>
                        <div class="card-title">🗂️ Fichier de configuration</div>
                        <div class="card-subtitle">Toute la config est stockée dans <code>config/config.json</code></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-danger btn-sm" onclick="cleanupConfig()" title="Supprimer les clés non définies dans les schémas">
                            🧹 Nettoyer la config
                        </button>
                        <button class="btn btn-ghost btn-sm" onclick="downloadConfig()">
                            ⬇️ Exporter
                        </button>
                    </div>
                </div>
            </div>

            ${sections.length === 0 ? `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <h3>Aucune configuration</h3>
                    <p>La configuration globale est vide.</p>
                </div>
            ` : sections.map(section => {
                const schema = state.globalSchemas[section];
                const sectionData = globalConfig[section] || {};
                const sectionLabel = schema?.label || section;
                const sectionIcon = schema?.icon || '📁';
                const fieldCount = Object.keys(schema?.fields || sectionData).length;

                return `
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">${sectionIcon} ${sectionLabel}</div>
                                <div class="card-subtitle">${fieldCount} paramètre(s)</div>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-ghost btn-sm" onclick="editGlobalSectionJson('${section}')">
                                    { } JSON
                                </button>
                                <button class="btn btn-primary btn-sm" onclick="editGlobalSection('${section}')">
                                    ✏️ Éditer
                                </button>
                            </div>
                        </div>
                        ${schema ? renderSchemaPreview(schema, sectionData) : renderConfigPreview(sectionData)}
                    </div>
                `;
            }).join('')}
        `;
    }

    function renderSchemaPreview(schema, values) {
        const fields = schema.fields || {};
        // Collect weight fields linked from messagelist fields so we can skip them
        const linkedWeightFields = new Set();
        for (const [, f] of Object.entries(fields)) {
            if (f.type === 'messagelist' && f.weightField) {
                linkedWeightFields.add(f.weightField);
            }
        }
        let html = '<div class="schema-preview">';
        for (const [key, field] of Object.entries(fields)) {
            if (linkedWeightFields.has(key)) continue;
            const val = values[key];
            const hasVal = val !== undefined && val !== null;
            const isSecret = field.secret || false;
            const fieldType = field.type || 'string';

            if (fieldType === 'messagelist' && Array.isArray(val) && val.length > 0) {
                const weightFieldKey = field.weightField || '';
                const weights = weightFieldKey ? (Array.isArray(values[weightFieldKey]) ? values[weightFieldKey] : []) : [];
                html += `
                    <div class="preview-row" style="flex-direction:column;gap:6px;">
                        <span class="preview-label">${field.label || key} (${val.length})</span>
                        <div style="display:flex;flex-direction:column;gap:4px;width:100%;">
                            ${val.map((msg, idx) => {
                                const w = idx < weights.length ? weights[idx] : 1;
                                return `
                                <div style="display:flex;gap:8px;align-items:center;padding:4px 8px;background:var(--bg-primary);border-radius:var(--radius);font-size:13px;">
                                    <span style="flex:1;color:var(--text-primary);">${escapeHtml(String(msg))}</span>
                                    <span style="color:var(--text-muted);font-size:12px;">×${w}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
                continue;
            }

            if (fieldType === 'models' && Array.isArray(val) && val.length > 0) {
                html += `
                    <div class="preview-row" style="flex-direction:column;gap:6px;">
                        <span class="preview-label">${field.label || key} (${val.length})</span>
                        <div style="display:flex;flex-direction:column;gap:4px;width:100%;">
                            ${val.map(m => `
                                <div style="display:flex;gap:8px;align-items:center;padding:4px 8px;background:var(--bg-primary);border-radius:var(--radius);font-size:13px;">
                                    <span style="font-weight:600;color:var(--accent);min-width:80px;">${escapeHtml(m.provider || '')}</span>
                                    <span style="color:var(--text-muted);font-family:Consolas,monospace;flex:1;">${escapeHtml(m.model_id || '')}</span>
                                    <span style="color:var(--text-secondary);">${escapeHtml(m.display_name || '')}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                continue;
            }

            if (fieldType === 'discord2name' && typeof val === 'object' && val !== null && !Array.isArray(val)) {
                const entries = Object.entries(val);
                html += `
                    <div class="preview-row" style="flex-direction:column;gap:6px;">
                        <span class="preview-label">${field.label || key} (${entries.length})</span>
                        <div style="display:flex;flex-direction:column;gap:4px;width:100%;">
                            ${entries.length > 0 ? entries.map(([id, name]) => `
                                <div style="display:flex;gap:8px;align-items:center;padding:4px 8px;background:var(--bg-primary);border-radius:var(--radius);font-size:13px;">
                                    <span style="color:var(--text-muted);font-family:Consolas,monospace;min-width:180px;">${escapeHtml(id)}</span>
                                    <span style="font-weight:600;color:var(--accent);">${escapeHtml(String(name))}</span>
                                </div>
                            `).join('') : '<span style="color:var(--text-muted);font-size:13px;">Aucun mapping configuré</span>'}
                        </div>
                    </div>
                `;
                continue;
            }

            if (fieldType === 'teams' && Array.isArray(val) && val.length > 0) {
                html += `
                    <div class="preview-row" style="flex-direction:column;gap:6px;">
                        <span class="preview-label">${field.label || key} (${val.length})</span>
                        <div style="display:flex;flex-direction:column;gap:4px;width:100%;">
                            ${val.map(t => `
                                <div style="display:flex;gap:8px;align-items:center;padding:4px 8px;background:var(--bg-primary);border-radius:var(--radius);font-size:13px;">
                                    <span style="font-weight:600;color:var(--accent);min-width:120px;">${escapeHtml(t.name || '???')}</span>
                                    <span style="color:var(--text-muted);min-width:100px;">${escapeHtml(t.game || 'valorant')}</span>
                                    ${t.vlrTeamId ? `<span style="color:var(--text-secondary);font-family:Consolas,monospace;">VLR#${escapeHtml(t.vlrTeamId)}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                continue;
            }

            if (fieldType === 'spotifymap' && Array.isArray(val) && val.length > 0) {
                html += `
                    <div class="preview-row" style="flex-direction:column;gap:6px;">
                        <span class="preview-label">${field.label || key} (${val.length})</span>
                        <div style="display:flex;flex-direction:column;gap:4px;width:100%;">
                            ${val.map(u => `
                                <div style="display:flex;gap:8px;align-items:center;padding:4px 8px;background:var(--bg-primary);border-radius:var(--radius);font-size:13px;">
                                    <span style="color:var(--text-muted);font-family:Consolas,monospace;min-width:120px;">${escapeHtml(u.spotifyId || '???')}</span>
                                    <span style="font-weight:600;color:var(--accent);min-width:100px;">${escapeHtml(u.name || '')}</span>
                                    <span style="color:var(--text-secondary);font-family:Consolas,monospace;">${escapeHtml(u.discordId || '')}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                continue;
            }

            let displayVal = '—';
            if (hasVal) {
                if (isSecret) displayVal = '••••••••';
                else if (typeof val === 'boolean') displayVal = val ? '✅ Oui' : '❌ Non';
                else if (Array.isArray(val)) displayVal = val.join(', ');
                else if (typeof val === 'object') displayVal = JSON.stringify(val);
                else displayVal = String(val);
            }
            html += `
                <div class="preview-row">
                    <span class="preview-label">${field.label || key}</span>
                    <span class="preview-value ${!hasVal ? 'empty' : ''}">${escapeHtml(displayVal)}</span>
                </div>
            `;
        }
        for (const key of Object.keys(values)) {
            if (!(key in fields)) {
                html += `
                    <div class="preview-row">
                        <span class="preview-label" style="color:var(--warning)">${key} <small>(non défini dans le schéma)</small></span>
                        <span class="preview-value">${escapeHtml(JSON.stringify(values[key]))}</span>
                    </div>
                `;
            }
        }
        html += '</div>';
        return html;
    }

    function renderConfigPreview(obj, prefix = '') {
        let html = '<div class="kv-grid">';
        for (const [key, value] of Object.entries(obj)) {
            const fullKey = prefix ? `${prefix}.${key}` : key;
            if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                html += `<div class="kv-key" style="grid-column: 1 / -1; color: var(--accent); margin-top: 8px;">▸ ${key}</div>`;
                html += renderConfigPreview(value, fullKey);
            } else {
                const displayValue = typeof value === 'string' && (key.toLowerCase().includes('token') || key.toLowerCase().includes('secret') || key.toLowerCase().includes('password'))
                    ? '••••••••'
                    : JSON.stringify(value);
                html += `
                    <div class="kv-key">${key}</div>
                    <div class="kv-value"><input type="text" value="${escapeHtml(displayValue)}" readonly></div>
                `;
            }
        }
        html += '</div>';
        return html;
    }

    async function editGlobalSection(section) {
        const globalConfig = state.config?.config || {};
        const sectionData = globalConfig[section] || {};
        const schema = state.globalSchemas[section];

        if (schema) {
            const formId = `global-${section}`;
            const formHtml = renderSchemaForm(formId, schema, sectionData);
            document.getElementById('modal-title').textContent = `${schema.label || section}`;
            document.getElementById('modal-overlay').querySelector('.modal-body').innerHTML = formHtml;
            const errEl = document.getElementById('json-error');
            if (errEl) errEl.textContent = '';
            modalSaveCallback = async () => {
                const values = collectFormValues(formId);
                const merged = { ...sectionData, ...values };
                await api(`/api/global-config/${section}`, {
                    method: 'PUT',
                    body: JSON.stringify({ section, config: merged }),
                });
                await loadConfig();
                render();
            };
            document.getElementById('modal-overlay').classList.add('active');
        } else {
            editGlobalSectionJson(section);
        }
    }

    async function editGlobalSectionJson(section) {
        const globalConfig = state.config?.config || {};
        const sectionData = globalConfig[section] || {};
        document.getElementById('modal-overlay').querySelector('.modal-body').innerHTML = `
            <textarea class="json-editor" id="json-editor" spellcheck="false"></textarea>
            <div class="json-error" id="json-error"></div>
        `;
        openModal(`Éditer JSON : ${section}`, sectionData, async (newData) => {
            await api(`/api/global-config/${section}`, {
                method: 'PUT',
                body: JSON.stringify({ section, config: newData }),
            });
            await loadConfig();
            render();
        });
    }

    // ── Server Page ───────────────────────────────────
    function renderServerPage() {
        const sid = state.currentServerId;
        const server = state.servers?.[sid];
        if (!server) {
            return `<div class="loading"><div class="spinner"></div> Chargement...</div>`;
        }
        const serverConfig = server.config || {};
        const allModuleNames = new Set([
            ...Object.keys(serverConfig),
            ...Object.keys(state.moduleSchemas),
        ]);
        const moduleNames = [...allModuleNames].sort();

        const CATEGORY_ORDER = ['Communauté', 'Médias & Streaming', 'Esport & Jeux', 'Événements', 'Outils'];
        const grouped = {};
        for (const mod of moduleNames) {
            const cat = state.moduleSchemas[mod]?.category || 'Autre';
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(mod);
        }
        const sortedCategories = Object.keys(grouped).sort((a, b) => {
            const ai = CATEGORY_ORDER.indexOf(a);
            const bi = CATEGORY_ORDER.indexOf(b);
            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        });

        const iconUrl = server.icon
            ? `https://cdn.discordapp.com/icons/${sid}/${server.icon}.png?size=128`
            : null;

        return `
            <div class="page-header">
                <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
                    <div class="server-icon" style="width:48px;height:48px;font-size:20px;">
                        ${iconUrl ? `<img src="${iconUrl}" alt="">` : server.name?.charAt(0) || '?'}
                    </div>
                    <div>
                        <h2>${server.name || sid}</h2>
                        <p>ID: ${sid} — ${Object.keys(serverConfig).length} module(s) configuré(s)</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Modules</div>
                </div>
                <div class="module-list">
                    ${moduleNames.length === 0 ? `
                        <div class="empty-state">
                            <h3>Aucun module</h3>
                            <p>Ce serveur n'a aucun module configuré.</p>
                        </div>
                    ` : sortedCategories.map(cat => {
                        const mods = grouped[cat];
                        const modItems = mods.map(mod => {
                            const modConfig = serverConfig[mod] || {};
                            const schema = state.moduleSchemas[mod];
                            const noToggle = schema?.noToggle === true;
                            const enabled = modConfig.enabled === true;
                            const label = schema?.label || state.modules[mod]?.label || mod;
                            const icon = schema?.icon || state.modules[mod]?.icon || '🧩';
                            const isConfigured = mod in serverConfig;
                            return `
                                <div class="module-item" onclick="navigate('module', '${sid}', '${mod}')">
                                    <div class="module-info">
                                        <span class="module-name">${icon} ${label}</span>
                                        <span class="module-status">${
                                            noToggle
                                                ? (isConfigured && Object.keys(modConfig).length > 0 ? '📝 Configuré' : '⚪ Non configuré')
                                                : (isConfigured
                                                    ? (enabled ? '✅ Activé' : '❌ Désactivé')
                                                    : '⚪ Non configuré')
                                        }</span>
                                    </div>
                                    ${noToggle ? '' : `
                                    <label class="toggle" onclick="event.stopPropagation()">
                                        <input type="checkbox" ${enabled ? 'checked' : ''}
                                            onchange="toggleModule('${sid}', '${mod}', this.checked)">
                                        <span class="toggle-slider"></span>
                                    </label>
                                    `}
                                </div>
                            `;
                        }).join('');
                        return `<div class="module-category-header">${cat}</div>${modItems}`;
                    }).join('')}
                </div>
            </div>
        `;
    }

    async function toggleModule(serverId, moduleName, enabled) {
        try {
            await api(`/api/servers/${serverId}/modules/${moduleName}/toggle`, {
                method: 'POST',
                body: JSON.stringify({ module: moduleName, enabled }),
            });
            toast(`${moduleName} ${enabled ? 'activé' : 'désactivé'}`, 'success');
            await loadServers();
            await loadConfig();
            render();
        } catch (e) { /* handled by api() */ }
    }

        return `

                <span>›</span>

            </div>

            <div class="page-header">

                        </button>

                            <button class="btn btn-success btn-sm" onclick="saveModuleForm('${sid}', '${mod}', '${formId}')">

                            </button>

                            🔄 Appliquer

                        </button>

                    </div>
                </div>
                ${schema
                    ? renderSchemaForm(formId, schema,
                        schema.directValue ? { [mod]: modConfig } : modConfig,
                        { excludeEnabled: true })
                    : (Object.keys(modConfig).length === 0
                        ? `<div class="empty-state">
                            <h3>Configuration vide</h3>
                            <p>Utilisez le bouton "JSON" pour ajouter des paramètres.</p>
                        </div>`
                        : renderConfigPreview(modConfig)
                    )
                }
            </div>

            ${schema && !schema.directValue ? renderExtraKeysCard(schema, modConfig) : ''}
        `;
    }

    function renderExtraKeysCard(schema, config) {
        const schemaKeys = new Set(Object.keys(schema.fields || {}));
        // Also include linked weight fields as known keys
        for (const [, f] of Object.entries(schema.fields || {})) {
            if (f.type === 'messagelist' && f.weightField) {
                schemaKeys.add(f.weightField);
            }
        }
        const extraKeys = Object.keys(config).filter(k => !schemaKeys.has(k));
        if (extraKeys.length === 0) return '';
        return `
            <div class="card" style="margin-top:16px;">
                <div class="card-header">
                    <div>
                        <div class="card-title">⚠️ Paramètres supplémentaires</div>
                        <div class="card-subtitle">Clés présentes dans la config mais pas dans le schéma</div>
                    </div>
                </div>
                <div class="kv-grid">
                    ${extraKeys.map(key => `
                        <div class="kv-key" style="color:var(--warning)">${key}</div>
                        <div class="kv-value"><input type="text" value="${escapeHtml(JSON.stringify(config[key]))}" readonly></div>
                    `).join('')}
                </div>
            </div>
        `;
    }

                    <div class="stat-value" style="color:var(--warning)">${warnCount}</div>
                </div>

                    <div class="stat-label">Streaming</div>
