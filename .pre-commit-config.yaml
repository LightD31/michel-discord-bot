# Pre-commit hooks — install with `pre-commit install`.
# Run all hooks locally: `pre-commit run --all-files`
#
# Hooks:
#   ruff           — lint + auto-fix
#   ruff-format    — formatter (like black)
#   detect-secrets — scans staged diffs for credentials; blocks commits like the
#                    deleted debug_sftp.py that shipped real passwords.
#   end-of-file    — POSIX file termination & trailing whitespace hygiene.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(grafana/|data/|logs/|\.secrets\.baseline$)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
